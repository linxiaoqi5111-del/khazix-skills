# 巨潮公告分类订阅器配置（用户可编辑）
# 说明：本文件驱动 fetch / 过滤 / 分类 / RSS / 归档全流程。改这里即可调订阅口径。

# ---- 抓取范围 ----
refresh_interval_minutes: 30 # 仅供 LaunchAgent 模板参考，脚本本身不常驻
lookback_days: 7 # seDate 回看天数（默认最近 7 天）
markets: [szse, sse, bj] # 保留的市场：szse=深 sse=沪 bj=北。按 code 前缀判定
watchlist_codes: [] # 空=全市场；非空=只保留这些代码（6 位字符串）
max_pages_per_source: 5 # 每个分类/关键词最多翻几页（防封 + 控时长），单页 50 条
page_size: 50
rate_limit_seconds: 2 # 串行请求间隔，防封

# ---- 输出落点 ----
# 相对路径相对「仓库根目录」解析（即包含 skills/ 的目录）；绝对路径原样使用。
output:
  rss_dir: skills/cninfo-rss/feeds
  kb_archive_dir: ../knowledge-base-private/wiki/raw/disclosures

# ---- L3 巨潮官方分类（分类码路径）----
# 重要：分类码命中只是「粗筛」，不能直接当 hard_delta；命中后还要过标题二次
# 校验（title_include_any / title_exclude_any）才算「准入」。enabled:false 不订阅。
# 分类码语义以巨潮前端分类枚举为准（不要望文生义）。
l3_categories:
  - code: category_yjygjxz_szsh
    name: 业绩预告
    fact_types: [earnings_guidance]
    enabled: true
    # 业绩预告分类较精准；噪音（风险提示等）由全局 exclude_any 兜底
  - code: category_yjkb_szsh
    name: 业绩快报
    fact_types: [earnings_flash]
    enabled: false # 关：该分类码实测返回大量全量公告，噪音高；业绩快报改走标题关键词
  - code: category_gqbd_szsh
    name: 股权变动
    fact_types: [share_change]
    enabled: true
    # 旧版误用 category_zj_szsh（巨潮官方含义=中介报告，非增减持），已纠正为
    # category_gqbd_szsh=股权变动。该分类仍偏宽，必须过标题准入门：
    title_include_any: [增持, 减持, 权益变动, 持股变动, 股份变动]
  - code: category_gqjl_szsh
    name: 股权激励
    fact_types: [equity_incentive]
    enabled: true
  - code: category_gfhpxx_szsh
    name: 分红送转
    fact_types: [dividend]
    enabled: false # 默认关：非 L3 硬催化

# ---- L3 标题关键词（关键词兜底路径，走 cninfo searchkey 服务端检索）----
l3_title_keywords:
  include_any: # 标题命中任一 → 进入 L3 候选
    - 重大合同
    - 中标
    - 签订
    - 订单
    - 量产
    - 投产
    - 扩产
    - 产能
    - 客户导入
    - 通过认证
    - 取得认证
    - 重大资产重组
    - 收购
    - 并购
    - 定增
    - 回购
    - 增持
    - 减持
    - 预披露
    - 项目落地
    - 试生产
    - 达产
    # 业绩快报/预增预减（原 category_yjkb_szsh 关闭后改走标题，更可控）
    - 业绩快报
    - 业绩预增
    - 业绩预减
    - 扭亏
    - 亏损
  exclude_any: # 命中任一 → 直接丢弃（噪音），优先级最高
    - 董事会决议
    - 监事会决议
    - 股东大会通知
    - 召开股东大会
    - 法律意见书
    - 独立意见
    - 核查意见
    - 保荐意见
    - 审计报告
    - 理财
    - 购买理财产品
    - 闲置资金
    - 日常关联交易
    - 续聘
    - 换届
    - 辞职
    - 聘任
    # 实测样本里的高噪音类型（担保进展/问询回复/股东会决议/风险提示等）
    - 专项说明
    - 承诺函
    - 审阅报告
    - 问询函
    - 关注函
    - 回复
    - 股东大会决议
    - 股东会决议
    - 风险提示
    - 担保

# ---- 低确定性降级（标题含这些词）----
# evidence_layer 仍 L3，但 update_type=review_candidate，confidence=low，不进 entity 正文
low_confidence_keywords:
  - 拟
  - 计划
  - 预计
  - 有望
  - 探索
  - 布局
  - 关注
  - 战略合作
  - 框架协议
  - 意向
  # 预披露=尚未实施的减持/重组计划，属「planned」而非「realized」，强制降级
  - 预披露
  - 预案

# ---- 关键词 → fact_type 映射（关键词路径用；分类路径用 l3_categories.fact_types）----
fact_type_by_keyword:
  重大合同: order_contract
  中标: order_contract
  签订: order_contract
  订单: order_contract
  量产: mass_production
  试生产: mass_production
  达产: mass_production
  投产: mass_production
  扩产: capacity_expansion
  产能: capacity_expansion
  客户导入: customer_validation
  通过认证: certification
  取得认证: certification
  重大资产重组: restructuring
  预披露: restructuring
  收购: acquisition
  并购: acquisition
  定增: private_placement
  回购: buyback
  增持: share_change
  减持: share_change
  项目落地: project_landing
  业绩快报: earnings_flash
  业绩预增: earnings_guidance
  业绩预减: earnings_guidance
  扭亏: earnings_guidance
  亏损: earnings_guidance
default_fact_type: other_hard

# ---- 组合规则：收紧 hard_delta（避免「宽词」单独命中即判高确定性）----
# 这些宽词单独命中只算 review_candidate（confidence=low）；标题需同时含同组任一
# 伴随词，才升级为 hard_delta（confidence=high）。未列出的关键词不受此约束。
# 人话：官方分类/单关键词是「粗筛」，组合规则是「准入门」。
hard_delta_combo_rules:
  签订: [合同, 订单, 协议, 中标, 采购, 框架]
  产能: [投产, 达产, 扩产, 量产, 募投, 建设]
  增持: [完成, 计划, 进展, 权益变动, 股份, 股东, 持股]
  减持: [完成, 计划, 进展, 权益变动, 股份, 股东, 持股]
  亏损: [业绩, 净利, 预计, 预告, 季度, 年度, 半年]
