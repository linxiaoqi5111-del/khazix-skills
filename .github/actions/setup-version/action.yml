name: Setup Version
description: "Setup Version"
inputs:
  type:
    required: true
    description: "Type of the app. Only 'desktop' is supported."
    default: "desktop"
outputs:
  APP_VERSION:
    description: "App Version"
    value: ${{ steps.version.outputs.APP_VERSION }}
runs:
  using: "composite"
  steps:
    - name: "Write Version"
      id: version
      shell: bash
      run: |
        if [ "${{ github.ref_type }}" == "tag" ]; then
          # Handle tag format: desktop/v1.2.3
          if [[ "${{ github.ref_name }}" =~ ^desktop/v(.*)$ ]]; then
            APP_VERSION="${BASH_REMATCH[2]}"
          else
            # Fallback for old format: v1.2.3
            APP_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          fi
        else
          APP_VERSION=$(node -p "require('./apps/desktop/package.json').version")
        fi
        echo $APP_VERSION
        echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_OUTPUT"
