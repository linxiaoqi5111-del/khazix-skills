version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: "12:00"
      timezone: Asia/Singapore
    target-branch: dev
    ignore:
      - dependency-name: "@shopify/flash-list"
        versions: [">1.7.3"]

      # Stuck by tailwindcss 4
      - dependency-name: tailwindcss
        versions: [">=4.0.0"]
      - dependency-name: daisyui
        versions: [">=5.0.0"]

      # It's using export map and metro doesn't support it well
      - dependency-name: unist-util-visit-parents
        versions: [">=6.0.0"]
      # electron 35
      - dependency-name: electron
        versions: [">=35.0.0"]
      # filter not work
      - dependency-name: unplugin-ast
        versions: ["0.14.5"]

    open-pull-requests-limit: 100
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      pathed:
        patterns:
          - immer
          - re-resizable
          - electron-context-menu
          - "@mozilla/readability"
          - daisyui
          - jsonpointer
          - workbox-precaching
          - "@pengx17/electron-forge-maker-appimage"
          - "@microflash/remark-callout-directives"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    target-branch: dev
    open-pull-requests-limit: 100
