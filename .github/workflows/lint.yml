on:
  pull_request:
  push:
    branches: [main, dev]

# Do not use secrets or variables to allow for public access
env:
  VITE_WEB_URL: http://127.0.0.1
  VITE_API_URL: http://127.0.0.1:0

name: ✨ CI Format, Typecheck and Lint
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-lint
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}
jobs:
  build:
    name: Format, Lint and Typecheck
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [lts/*]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Checkout LFS objects
        run: git lfs checkout

      - uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --child-concurrency=1
      - name: Build desktop web
        run: |
          npm exec turbo run FinHot#build:web
      - name: Format, Lint and Typecheck
        run: |
          export NODE_OPTIONS="--max_old_space_size=16384"
          npm exec turbo run format:check typecheck lint
      - name: Run test
        run: npm exec turbo run test
